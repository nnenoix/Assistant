# Minimal OTel collector — accepts OTLP from the agent, exports to stdout
# for dev visibility. Wire `langfuse` exporter (or any OTLP-compatible
# backend) by uncommenting + filling endpoint/key.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 100
    timeout: 10s
  memory_limiter:
    check_interval: 5s
    limit_percentage: 75
    spike_limit_percentage: 25

exporters:
  debug:
    verbosity: normal
  # langfuse:
  #   endpoint: ${env:LANGFUSE_HOST}
  #   headers:
  #     authorization: Basic ${env:LANGFUSE_AUTH_B64}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]
