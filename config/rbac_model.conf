# Casbin RBAC model — used by src/rbac.py when the `casbin` library is installed.
# Fall-back: when casbin isn't available, src/rbac.py keeps using its
# first-match-wins glob matcher against config/rbac.csv (identical semantics
# for the wildcards `*`, `prefix.*`, `*.suffix`).

[request_definition]
r = sub, obj

[policy_definition]
p = sub, obj, eft

[policy_effect]
e = some(where (p.eft == allow)) && !some(where (p.eft == deny))

[matchers]
m = (r.sub == p.sub || p.sub == "*") && (r.obj == p.obj || keyMatch2(r.obj, p.obj))
