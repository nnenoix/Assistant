apiVersion: v1
kind: ConfigMap
metadata:
  name: workspace-agent-config
  namespace: workspace-agent
data:
  # FastAPI app behavior
  APP_ENV: "prod"
  LOG_LEVEL: "INFO"
  ENABLE_MCP_HTTP: "1"

  # Multi-tenant defaults
  DEFAULT_TENANT_ID: "default"

  # OIDC — point at an in-cluster Authentik. Override for hosted IdP.
  OIDC_ISSUER: "http://authentik.authentik.svc.cluster.local/application/o/workspace-agent/"
  OIDC_AUDIENCE: "workspace-agent"
  OIDC_JWKS_URL: "http://authentik.authentik.svc.cluster.local/application/o/workspace-agent/jwks/"

  # Postgres — service DNS from the StatefulSet in 20-postgres.yaml.
  # The actual password lives in the secret, see 11-secret.example.yaml.
  POSTGRES_HOST: "postgres.workspace-agent.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "workspace_agent"
  POSTGRES_USER: "agent"
  USE_POSTGRES_STORAGE: "1"

  # Redis — for arq queue + caches
  REDIS_HOST: "redis.workspace-agent.svc.cluster.local"
  REDIS_PORT: "6379"

  # OpenTelemetry
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.workspace-agent.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "workspace-agent"
