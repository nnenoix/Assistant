---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: workspace-agent
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: workspace-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--save", "", "--appendonly", "no"]
          # ↑ arq queue is ephemeral; persistence off keeps the
          # container fast + drops the PVC dependency. If you start
          # using redis as a cache that NEEDS to survive restarts,
          # switch to RDB (--save "60 1") + add a PVC.
          ports:
            - containerPort: 6379
          resources:
            requests: { memory: "64Mi",  cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "500m" }
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
