<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workspace Agent</title>
<link rel="preconnect" href="https://esm.sh" />
<style>
  :root, :root[data-theme="dark"] {
    --bg:            #0e0f12;
    --bg-2:          #14161b;
    --surface:       #15181f;
    --surface-2:     #1a1e26;
    --border:        #232832;
    --border-2:      #2c323e;
    --text:          #e6e8ee;
    --text-2:        #a3a8b4;
    --text-3:        #6b7280;
    --primary:       #2563eb;
    --primary-soft:  rgba(37, 99, 235, 0.16);
    --primary-text:  #93b4ff;
    --user-bubble-bg:#2563eb;
    --user-bubble-tx:#f3f6ff;
    --danger:        #b91c1c;
    --danger-soft:   rgba(185, 28, 28, 0.18);
    --danger-text:   #fca5a5;
    --warn-soft:     rgba(202, 138, 4, 0.16);
    --warn-text:     #fcd34d;
    --ok-soft:       rgba(22, 163, 74, 0.16);
    --ok-text:       #86efac;
    --header-bg:     rgba(14,15,18,0.85);
    --scrollbar:     #262b35;
    --scrollbar-hov: #313846;
    --modal-backdrop: rgba(6, 7, 10, 0.72);
    --mono: ui-monospace, SFMono-Regular, "JetBrains Mono", "Menlo", "Consolas", monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 24px rgba(0,0,0,0.32);
  }
  :root[data-theme="light"] {
    --bg:            #ffffff;
    --bg-2:          #f7f8fa;
    --surface:       #ffffff;
    --surface-2:     #f4f6f9;
    --border:        #e6e8ec;
    --border-2:      #d3d7de;
    --text:          #0e1116;
    --text-2:        #4b5563;
    --text-3:        #8b92a0;
    --primary:       #2563eb;
    --primary-soft:  rgba(37, 99, 235, 0.10);
    --primary-text:  #1d4fd8;
    --user-bubble-bg:#2563eb;
    --user-bubble-tx:#ffffff;
    --danger:        #b91c1c;
    --danger-soft:   rgba(185, 28, 28, 0.08);
    --danger-text:   #b91c1c;
    --warn-soft:     rgba(202, 138, 4, 0.10);
    --warn-text:     #92400e;
    --ok-soft:       rgba(22, 163, 74, 0.10);
    --ok-text:       #15803d;
    --header-bg:     rgba(255,255,255,0.85);
    --scrollbar:     #d6dae0;
    --scrollbar-hov: #b4bac4;
    --modal-backdrop: rgba(15, 23, 42, 0.40);
    --shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 8px 24px rgba(15,23,42,0.10);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--primary-soft); }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hov); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* layout */
  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    width: 100%;
  }

  /* header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 0 24px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    background: var(--header-bg);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 5;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; letter-spacing: -0.01em;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.18);
  }
  .brand-title { font-size: 13.5px; }
  .brand-sub { font-size: 11.5px; color: var(--text-3); margin-left: 6px; }

  .header-right { display: flex; align-items: center; gap: 10px; }
  .accounts-chips {
    display: flex; gap: 6px; align-items: center;
    max-width: 50vw; overflow: hidden;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 11.5px;
    color: var(--text-2);
    line-height: 1;
    white-space: nowrap;
  }
  .chip .chip-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4ade80;
  }
  .chip.muted { color: var(--text-3); }
  .chip.muted .chip-dot { background: var(--text-3); }
  .header-link {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-2);
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: color .15s, border-color .15s, background .15s;
  }
  .header-link:hover { color: var(--text); border-color: var(--border-2); background: var(--surface-2); }
  button.header-link { font-family: var(--sans); cursor: pointer; font-size: 12.5px; }
  .header-link.icon-only { padding: 6px 8px; }
  .header-link.icon-only svg { width: 14px; height: 14px; }

  /* model select — sits in the header next to the theme toggle */
  .model-select {
    appearance: none;
    -webkit-appearance: none;
    font-family: var(--sans);
    font-size: 12.5px;
    color: var(--text-2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 26px 6px 10px;
    cursor: pointer;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-3) 50%), linear-gradient(135deg, var(--text-3) 50%, transparent 50%);
    background-position: calc(100% - 14px) 50%, calc(100% - 9px) 50%;
    background-size: 5px 5px;
    background-repeat: no-repeat;
    transition: color .15s, border-color .15s, background-color .15s;
  }
  .model-select:hover { color: var(--text); border-color: var(--border-2); background-color: var(--surface-2); }
  .model-select:disabled { opacity: 0.5; cursor: not-allowed; }
  .model-select option { background: var(--surface); color: var(--text); }

  /* log */
  .log-wrap {
    overflow-y: auto;
    overflow-x: hidden;
    scroll-behavior: smooth;
  }
  .log {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* messages */
  .turn-user {
    display: flex; justify-content: flex-end;
  }
  .bubble-user {
    max-width: 78%;
    background: var(--user-bubble-bg);
    color: var(--user-bubble-tx);
    padding: 9px 14px;
    border-radius: 14px 14px 4px 14px;
    font-size: 14px;
    white-space: pre-wrap;
    word-wrap: break-word;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06) inset;
  }

  .turn-asst {
    display: flex; flex-direction: column;
    gap: 10px;
    max-width: 100%;
  }

  .bubble-asst {
    background: transparent;
    color: var(--text);
    font-size: 14px;
    line-height: 1.62;
    padding: 2px 0;
  }
  /* markdown defaults */
  .bubble-asst > *:first-child { margin-top: 0; }
  .bubble-asst > *:last-child  { margin-bottom: 0; }
  .bubble-asst p { margin: 0 0 10px; }
  .bubble-asst h1, .bubble-asst h2, .bubble-asst h3 {
    margin: 16px 0 8px; font-weight: 600; letter-spacing: -0.01em;
  }
  .bubble-asst h1 { font-size: 18px; }
  .bubble-asst h2 { font-size: 16px; }
  .bubble-asst h3 { font-size: 14.5px; color: var(--text); }
  .bubble-asst ul, .bubble-asst ol { margin: 4px 0 10px; padding-left: 22px; }
  .bubble-asst li { margin: 3px 0; }
  .bubble-asst a { color: var(--primary-text); text-decoration: none; border-bottom: 1px solid rgba(147,180,255,0.3); }
  .bubble-asst a:hover { border-bottom-color: var(--primary-text); }
  .bubble-asst code {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .bubble-asst pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.5;
    margin: 6px 0 12px;
  }
  .bubble-asst pre code { background: none; border: none; padding: 0; font-size: 12.5px; }
  .bubble-asst table { border-collapse: collapse; margin: 8px 0 14px; font-size: 13px; display: block; overflow-x: auto; }
  .bubble-asst th, .bubble-asst td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .bubble-asst th { background: var(--surface); font-weight: 600; color: var(--text); }
  .bubble-asst blockquote {
    margin: 8px 0; padding: 4px 12px;
    border-left: 2px solid var(--border-2);
    color: var(--text-2);
  }
  .bubble-asst hr { border: 0; border-top: 1px solid var(--border); margin: 14px 0; }

  /* tool card */
  .tool {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius);
    overflow: hidden;
    font-family: var(--mono);
    font-size: 12.5px;
  }
  .tool.err { border-color: rgba(185,28,28,0.5); }
  .tool-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background .12s;
  }
  .tool-head:hover { background: var(--surface-2); }
  .tool-icon {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 5px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--text-2);
    flex: 0 0 auto;
  }
  .tool-icon svg { width: 13px; height: 13px; }
  .tool.err .tool-icon { color: var(--danger-text); border-color: rgba(185,28,28,0.4); background: var(--danger-soft); }
  .tool-name {
    color: var(--text);
    font-weight: 500;
  }
  .tool-args-preview {
    color: var(--text-3);
    margin-left: 4px;
    flex: 1 1 auto;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .tool-account {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 11px;
    color: var(--text-2);
    flex: 0 0 auto;
  }
  .tool-account .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: #4ade80; }
  .tool-account.default { color: var(--text-3); }
  .tool-account.default .chip-dot { background: var(--text-3); }

  /* copy button — hover-revealed on assistant bubbles and tool results */
  .copy-host { position: relative; }
  .copy-btn {
    position: absolute;
    top: 6px; right: 6px;
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 7px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text-2);
    border-radius: 6px;
    font-family: var(--sans);
    font-size: 11px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .12s, color .12s, border-color .12s, background .12s;
    z-index: 2;
  }
  .copy-host:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--text); border-color: var(--border-2); background: var(--surface); }
  .copy-btn.copied { color: var(--ok-text); border-color: rgba(22,163,74,0.35); background: var(--ok-soft); opacity: 1; }
  .copy-btn svg { width: 12px; height: 12px; }
  .bubble-wrap { padding-right: 4px; }
  .tool-status {
    display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--sans);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 999px;
    flex: 0 0 auto;
  }
  .tool-status.pending { color: var(--text-3); background: var(--bg-2); border: 1px solid var(--border); }
  .tool-status.ok { color: var(--ok-text); background: var(--ok-soft); border: 1px solid rgba(22,163,74,0.25); }
  .tool-status.err { color: var(--danger-text); background: var(--danger-soft); border: 1px solid rgba(185,28,28,0.3); }
  .tool-chev {
    color: var(--text-3); transition: transform .15s; flex: 0 0 auto;
  }
  .tool-chev svg { width: 14px; height: 14px; display: block; }
  .tool.open .tool-chev { transform: rotate(90deg); }

  .tool-body {
    border-top: 1px solid var(--border);
    background: var(--bg-2);
  }
  .tool-section {
    padding: 10px 12px;
  }
  .tool-section + .tool-section { border-top: 1px solid var(--border); }
  .tool-section-label {
    font-family: var(--sans);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .tool-section pre {
    margin: 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 280px;
    overflow: auto;
  }
  .tool-section.err pre { color: var(--danger-text); }

  /* denied badge */
  .denied {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: var(--danger-soft);
    color: var(--danger-text);
    border: 1px solid rgba(185,28,28,0.3);
    border-radius: 999px;
    font-size: 12px;
    font-family: var(--mono);
    align-self: flex-start;
  }
  .denied .strike { text-decoration: line-through; }

  /* fatal banner */
  .fatal {
    border: 1px solid rgba(185,28,28,0.45);
    background: var(--danger-soft);
    color: var(--danger-text);
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13px;
    display: flex; align-items: flex-start; gap: 10px;
  }
  .fatal svg { width: 16px; height: 16px; flex: 0 0 auto; margin-top: 2px; }

  /* thinking indicator */
  .thinking {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--text-3);
    font-size: 12.5px;
    padding: 4px 0;
  }
  .dots { display: inline-flex; gap: 3px; }
  .dots span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-3);
    animation: blink 1.2s infinite ease-in-out both;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-2px); }
  }

  /* empty state */
  .empty {
    margin: auto;
    max-width: 520px;
    padding: 56px 24px;
    text-align: center;
    color: var(--text-2);
  }
  .empty-mark {
    width: 44px; height: 44px;
    margin: 0 auto 18px;
    border-radius: 12px;
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--primary-text);
  }
  .empty-mark svg { width: 22px; height: 22px; }
  .empty h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
    margin: 0 0 6px;
  }
  .empty p.lead {
    font-size: 13px;
    color: var(--text-2);
    margin: 0 0 22px;
  }
  .empty-caps {
    display: grid;
    gap: 8px;
    text-align: left;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .empty-cap {
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 13px; color: var(--text-2);
  }
  .empty-cap-icon {
    color: var(--text-3);
    width: 16px; height: 16px;
    flex: 0 0 auto;
    margin-top: 2px;
  }
  .empty-cap-icon svg { width: 14px; height: 14px; }
  .empty-hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--text-3);
  }

  /* input */
  .composer-wrap {
    border-top: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(14,15,18,0) 0%, var(--bg) 24px);
  }
  .composer {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px 24px 22px;
  }
  .composer-inner {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px 8px 8px 14px;
    transition: border-color .15s, background .15s;
  }
  .composer-inner:focus-within {
    border-color: rgba(37,99,235,0.5);
    background: var(--surface-2);
  }
  .composer-inner.disabled {
    opacity: 0.55;
    pointer-events: none;
  }
  .composer textarea {
    flex: 1 1 auto;
    background: transparent;
    border: 0;
    outline: 0;
    resize: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.55;
    padding: 8px 0;
    max-height: 168px; /* ~6 rows */
    min-height: 24px;
  }
  .composer textarea::placeholder { color: var(--text-3); }
  .send-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: var(--primary);
    border: 0;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    transition: background .12s, transform .12s;
    flex: 0 0 auto;
  }
  .send-btn:hover:not(:disabled) { background: #1d4fd8; }
  .send-btn:active:not(:disabled) { transform: scale(0.96); }
  .send-btn:disabled { background: var(--surface-2); color: var(--text-3); cursor: not-allowed; border: 1px solid var(--border); }
  .send-btn svg { width: 16px; height: 16px; }

  .attach-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-2);
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
    flex: 0 0 auto;
  }
  .attach-btn:hover:not(:disabled) { background: var(--surface-2); color: var(--text); border-color: var(--border-2); }
  .attach-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .attach-btn svg { width: 16px; height: 16px; }

  .attachments-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 8px;
  }
  .attachment-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--primary-soft);
    color: var(--primary-text);
    border: 1px solid rgba(37,99,235,0.4);
    border-radius: 16px;
    padding: 4px 4px 4px 10px;
    font-size: 12px;
    line-height: 1.4;
    max-width: 280px;
  }
  .attachment-chip .chip-icon { width: 13px; height: 13px; flex: 0 0 auto; }
  .attachment-chip .chip-name {
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .attachment-chip .chip-meta { color: var(--text-3); font-size: 10.5px; }
  .attachment-chip button {
    background: transparent;
    border: 0;
    color: inherit;
    width: 18px; height: 18px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    opacity: 0.7;
    transition: opacity .12s, background .12s;
  }
  .attachment-chip button:hover { opacity: 1; background: rgba(255,255,255,0.08); }
  .attachment-chip button svg { width: 11px; height: 11px; }
  .attachment-chip.uploading { opacity: 0.7; }
  .attachment-chip.uploading::after {
    content: ''; width: 10px; height: 10px;
    border: 1.5px solid currentColor; border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 4px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .composer-inner.dropping {
    border-color: var(--primary);
    background: var(--primary-soft);
  }
  .drop-hint {
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--primary-text);
    font-size: 13px;
    pointer-events: none;
    background: rgba(37,99,235,0.08);
    border-radius: 12px;
  }

  .composer-meta {
    margin-top: 8px;
    display: flex; justify-content: space-between;
    color: var(--text-3);
    font-size: 11.5px;
  }

  /* ── first-run wizard ─────────────────────────────────────────── */
  .wiz-wrap {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .wiz {
    width: 100%; max-width: 540px;
    padding: 48px 36px;
    text-align: center;
  }
  .wiz h1 { font-size: 28px; margin-bottom: 32px; font-weight: 600; }
  .wiz .step-num {
    color: var(--text-3); font-size: 13px;

    margin-bottom: 14px;
  }
  .wiz .step-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
  .wiz .step-sub { color: var(--text-2); font-size: 14px; margin-bottom: 32px; }
  .wiz .big-btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 8px;
    min-width: 220px;
    padding: 14px 28px;

    color: white;

    border-radius: 10px;
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    transition: background .12s, transform .12s;
  }
  .wiz .big-btn:hover:not(:disabled) { background: #1d4fd8; }
  .wiz .big-btn:active:not(:disabled) { transform: scale(.97); }
  .wiz .big-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .wiz .big-btn .spinner {
    width: 14px; height: 14px;
    border: 2px solid currentColor; border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .wiz .err {
    margin-top: 18px;
    color: var(--danger-text);
    font-size: 13px;
    background: var(--danger-soft);
    border: 1px solid rgba(185, 28, 28, 0.4);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: left;
  }
  .wiz .phase {
    margin-top: 20px;
    color: var(--text-2);
    font-size: 13px;
    line-height: 1.5;
  }
  .wiz .progress {
    display: flex; justify-content: center; gap: 8px; margin-bottom: 40px;
  }
  .wiz .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border-2);
  }
  .wiz .dot.active { background: var(--primary); }
  .wiz .dot.done { background: var(--ok-text); }

  /* alerts banner — pushed by background watcher when a monitored
     Apps Script logs a failure (Exception, 429-stop, SyntaxError, ...) */
  .alerts-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .alerts-banner {
    background: var(--warn-soft);
    border: 1px solid rgba(202, 138, 4, 0.5);
    border-radius: 10px;
    padding: 10px 12px;
    margin: 0 0 12px 0;
    display: flex; flex-direction: column;
    gap: 8px;
  }
  .alerts-banner.severity-error {
    background: var(--danger-soft);
    border-color: rgba(185, 28, 28, 0.5);
  }
  .alerts-banner-head {
    display: flex; align-items: center; gap: 8px;
    color: var(--warn-text);
    font-size: 12px;
    font-weight: 600;
  }
  .alerts-banner.severity-error .alerts-banner-head { color: var(--danger-text); }
  .alerts-banner-head svg { width: 14px; height: 14px; }
  .alerts-banner-head .count { background: rgba(255,255,255,0.1); border-radius: 9px; padding: 1px 7px; font-size: 11px; }
  .alerts-banner-head .clear {
    margin-left: auto;
    color: inherit; background: transparent; border: 0;
    cursor: pointer; opacity: 0.7; font-size: 11.5px;
  }
  .alerts-banner-head .clear:hover { opacity: 1; }
  .alert-row {
    background: rgba(0,0,0,0.18);
    border-radius: 7px;
    padding: 8px 10px;
    display: flex; gap: 10px; align-items: flex-start;
    font-size: 12.5px;
    color: var(--text);
  }
  .alert-row .alert-meta {
    color: var(--text-3);
    font-size: 11px;
    font-family: var(--mono);
  }
  .alert-row .alert-msg {
    flex: 1 1 auto;
    overflow: hidden;
    line-height: 1.45;
  }
  .alert-row .alert-msg .kind { font-weight: 600; color: var(--warn-text); }
  .alerts-banner.severity-error .alert-row .alert-msg .kind { color: var(--danger-text); }
  .alert-row .actions {
    display: flex; flex-direction: column; gap: 4px; flex: 0 0 auto;
  }
  .alert-row button {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 6px;
    color: var(--text-2);
    cursor: pointer;
    padding: 3px 8px;
    font-size: 11px;
    transition: background .12s;
  }
  .alert-row button:hover { background: var(--surface-2); color: var(--text); }
  .alert-row button.primary {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .alert-row button.primary:hover { background: #1d4fd8; }
  .kbd {
    font-family: var(--mono);
    font-size: 10.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--text-2);
  }

  /* approval modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: var(--modal-backdrop);
    backdrop-filter: blur(4px);
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn .12s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    width: 100%;
    max-width: 540px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 14px;
    box-shadow: var(--shadow);
    overflow: hidden;
    animation: popIn .14s ease-out;
  }
  @keyframes popIn { from { opacity: 0; transform: translateY(6px) scale(0.98); } to { opacity: 1; transform: none; } }
  .modal-head {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-eyebrow {
    display: flex; align-items: center; gap: 8px;
    font-size: 11.5px;
    color: var(--warn-text);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .modal-eyebrow svg { width: 13px; height: 13px; }
  .modal h2 {
    margin: 0;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--text);
    word-break: break-all;
  }
  .modal-policy {
    display: inline-flex;
    align-items: center;
    margin-top: 8px;
    padding: 3px 9px;
    background: var(--warn-soft);
    color: var(--warn-text);
    border: 1px solid rgba(202,138,4,0.3);
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 11.5px;
  }
  .modal-body { padding: 16px 20px 18px; }
  .modal-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    margin-bottom: 6px;
  }
  .modal pre {
    margin: 0;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text);
    max-height: 240px;
    overflow: auto;
    line-height: 1.55;
  }
  .modal-foot {
    display: flex; justify-content: flex-end; gap: 8px;
    padding: 12px 20px 18px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background .12s, border-color .12s, color .12s;
    font-family: var(--sans);
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border-color: var(--border);
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--border-2); background: var(--surface-2); }
  .btn-danger {
    background: var(--danger);
    color: white;
  }
  .btn-danger:hover { background: #a51919; }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: #1d4fd8; }
  .btn[disabled] { opacity: 0.6; cursor: wait; }

  /* connection error banner */
  .conn-err {
    margin: 12px auto;
    max-width: 760px;
    border: 1px solid rgba(185,28,28,0.45);
    background: var(--danger-soft);
    color: var(--danger-text);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    font-size: 13px;
  }
  .conn-err svg { width: 16px; height: 16px; flex: 0 0 auto; }
  .conn-err button {
    margin-left: auto;
    background: transparent;
    color: var(--danger-text);
    border: 1px solid rgba(252,165,165,0.4);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  .conn-err button:hover { background: rgba(252,165,165,0.1); }

  /* responsive */
  @media (max-width: 720px) {
    .header { padding: 0 16px; }
    .log { padding: 20px 14px 32px; }

  }
</style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { h, render, Fragment } from "https://esm.sh/preact@10.22.0";
import { useState, useEffect, useRef, useCallback, useMemo } from "https://esm.sh/preact@10.22.0/hooks";
import htm from "https://esm.sh/htm@3.1.1";
import { marked } from "https://esm.sh/marked@12.0.2";
import {
  HardDrive, Sheet, Code2, FileSpreadsheet, Folder, KeyRound,
  ChevronRight, TriangleAlert, Send, ShieldCheck, Sparkles, RefreshCw,
  Users, Copy, Check, Box, Sun, Moon,
  Paperclip, X, File, FileText, Image,
} from "https://esm.sh/lucide-preact@0.475.0?deps=preact@10.22.0";

const html = htm.bind(h);

/* ── markdown config ─────────────────────────────────────────────── */
marked.setOptions({
  gfm: true,
  breaks: true,
  headerIds: false,
  mangle: false,
});

/* ── icon wrapper (lucide-preact via CDN) ────────────────────────── */
const ICONS = {
  drive: HardDrive,
  sheet: Sheet,
  code: Code2,
  spreadsheet: FileSpreadsheet,
  folder: Folder,
  key: KeyRound,
  chevron: ChevronRight,
  alert: TriangleAlert,
  send: Send,
  shield: ShieldCheck,
  sparkle: Sparkles,
  refresh: RefreshCw,
  user: Users,
  copy: Copy,
  check: Check,
  box: Box,
  sun: Sun,
  moon: Moon,
  paperclip: Paperclip,
  x: X,
  file: File,
  "file-text": FileText,
  image: Image,
};
const Icon = ({ name, size = 14, ...rest }) => {
  const Comp = ICONS[name] || ICONS.box;
  return h(Comp, { size, ...rest });
};

/* ── tool → icon group ───────────────────────────────────────────── */
function toolIcon(name) {
  if (!name) return "box";
  if (name.startsWith("drive_")) return "drive";
  if (name.startsWith("sheets_")) return "sheet";
  if (name.startsWith("apps_script_")) return "code";
  if (name.startsWith("excel_")) return "spreadsheet";
  if (name.startsWith("local_")) return "folder";
  if (name.startsWith("auth_")) return "key";
  return "box";
}

/* ── short inline preview of tool input args ─────────────────────── */
function argPreview(input) {
  if (!input || typeof input !== "object") return "";
  const parts = [];
  for (const [k, v] of Object.entries(input)) {
    let val;
    if (v === null || v === undefined) val = String(v);
    else if (typeof v === "string") val = v.length > 28 ? JSON.stringify(v.slice(0, 28) + "…") : JSON.stringify(v);
    else if (typeof v === "number" || typeof v === "boolean") val = String(v);
    else if (Array.isArray(v)) val = `[${v.length}]`;
    else val = "{…}";
    parts.push(`${k}=${val}`);
    if (parts.join(", ").length > 80) break;
  }
  return parts.join(", ");
}

/* ── copy button ─────────────────────────────────────────────────── */
function CopyButton({ getText, title = "Скопировать" }) {
  const [copied, setCopied] = useState(false);
  const onClick = async (e) => {
    e.stopPropagation();
    const text = typeof getText === "function" ? getText() : getText;
    try {
      await navigator.clipboard.writeText(text || "");
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text || "";
      ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch {}
      document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };
  return html`
    <button class=${"copy-btn" + (copied ? " copied" : "")} onClick=${onClick} title=${title}>
      <${Icon} name=${copied ? "check" : "copy"} size=${12} />
      ${copied ? "Скопировано" : "Копировать"}
    </button>
  `;
}

/* ── tool card ───────────────────────────────────────────────────── */
function ToolCard({ tool }) {
  const [open, setOpen] = useState(false);
  const status = tool.error
    ? html`<span class="tool-status err">ошибка</span>`
    : tool.denied
      ? html`<span class="tool-status err">отклонено</span>`
      : tool.result !== undefined
        ? html`<span class="tool-status ok">готово</span>`
        : html`<span class="tool-status pending">выполняется…</span>`;

  const rawAcct = tool.input && tool.input.account;
  const acct = rawAcct || "main";
  const isDefaultAcct = !rawAcct;

  return html`
    <div class=${"tool" + (tool.error ? " err" : "") + (open ? " open" : "")}>
      <div class="tool-head" onClick=${() => setOpen(o => !o)}>
        <span class="tool-icon">
          <${Icon} name=${toolIcon(tool.name)} size=${13} />
        </span>
        <span class="tool-name">${tool.name}</span>
        <span class="tool-args-preview">${argPreview(tool.input)}</span>
        <span class=${"tool-account" + (isDefaultAcct ? " default" : "")}
              title=${isDefaultAcct ? "Google аккаунт (по умолчанию)" : "Google аккаунт"}>
          <span class="chip-dot"></span>${acct}
        </span>
        ${status}
        <span class="tool-chev"><${Icon} name="chevron" size=${14} /></span>
      </div>
      ${open && html`
        <div class="tool-body">
          <div class="tool-section copy-host">
            <div class="tool-section-label">Параметры</div>
            <pre>${JSON.stringify(tool.input ?? {}, null, 2)}</pre>
            <${CopyButton} getText=${() => JSON.stringify(tool.input ?? {}, null, 2)} />
          </div>
          ${(tool.result !== undefined || tool.error) && html`
            <div class=${"tool-section copy-host" + (tool.error ? " err" : "")}>
              <div class="tool-section-label">${tool.error ? "Ошибка" : "Результат (превью)"}</div>
              <pre>${tool.error || tool.result || "—"}</pre>
              <${CopyButton} getText=${() => tool.error || tool.result || ""} />
            </div>
          `}
        </div>
      `}
    </div>
  `;
}

/* ── markdown safe-ish render ────────────────────────────────────── */
function Markdown({ text }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.innerHTML = marked.parse(text || "");
  }, [text]);
  return html`
    <div class="copy-host bubble-wrap">
      <div class="bubble-asst" ref=${ref}></div>
      <${CopyButton} getText=${() => text || ""} />
    </div>
  `;
}

/* ── denied / fatal ──────────────────────────────────────────────── */
function DeniedBadge({ name }) {
  return html`<span class="denied">denied: <span class="strike">${name}</span></span>`;
}
function FatalBlock({ msg }) {
  return html`
    <div class="fatal">
      <${Icon} name="alert" />
      <div>
        <div style="font-weight:600;margin-bottom:2px;">Произошла фатальная ошибка</div>
        <div style="font-family:var(--mono);font-size:12.5px;word-break:break-all;">${msg}</div>
      </div>
    </div>
  `;
}

/* ── empty state ─────────────────────────────────────────────────── */
function EmptyState() {
  const caps = [
    { icon: "drive",       text: "показывать файлы в Drive (свои и расшаренные)" },
    { icon: "sheet",       text: "читать и редактировать Google Sheets" },
    { icon: "spreadsheet", text: "парсить Excel и заливать данные в Sheets" },
    { icon: "code",        text: "управлять Apps Script проектами" },
    { icon: "user",        text: "работать с несколькими Google-аккаунтами одновременно" },
  ];
  return html`
    <div class="empty">
      <div class="empty-mark"><${Icon} name="sparkle" /></div>
      <h1>Workspace Agent</h1>
      <p class="lead">Опишите задачу — агент решит её через инструменты Drive, Sheets и Apps Script.</p>
      <div class="empty-caps">
        ${caps.map(c => html`
          <div class="empty-cap" key=${c.icon}>
            <span class="empty-cap-icon"><${Icon} name=${c.icon} /></span>
            <span>${c.text}</span>
          </div>
        `)}
      </div>
      <p class="empty-hint">Опасные действия требуют подтверждения.</p>
    </div>
  `;
}

/* ── approval modal ──────────────────────────────────────────────── */
function ApprovalModal({ req, onResolve }) {
  const [busy, setBusy] = useState(false);
  if (!req) return null;

  const decide = async (approved) => {
    setBusy(true);
    try {
      await fetch(`/approve/${req.request_id}`, {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ approved }),
      });
    } catch (e) {
      console.error("approve failed", e);
    } finally {
      onResolve(req.request_id, approved);
    }
  };

  return html`
    <div class="modal-backdrop">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modal-head">
          <div class="modal-eyebrow">
            <${Icon} name="shield" />
            Требуется подтверждение
          </div>
          <h2>${req.name}</h2>
          ${req.policy_op && html`<div class="modal-policy">${req.policy_op}</div>`}
        </div>
        <div class="modal-body">
          <div class="modal-label">Параметры вызова</div>
          <pre>${JSON.stringify(req.input ?? {}, null, 2)}</pre>
        </div>
        <div class="modal-foot">
          <button class="btn btn-danger" disabled=${busy} onClick=${() => decide(false)}>
            Отклонить
          </button>
          <button class="btn btn-primary" disabled=${busy} onClick=${() => decide(true)}>
            Подтвердить
          </button>
        </div>
      </div>
    </div>
  `;
}

/* ── accounts modal — in-app Google account manager
       (was a separate /accounts page that opened in the system browser;
        moved here so the user stays inside the pywebview window) ────── */
function AccountsModal({ open, onClose }) {
  const [data, setData] = useState(null);        // { alias: { email, name, scopes, error? } }
  const [busy, setBusy] = useState(null);        // alias being mutated, or "__add__"
  const [error, setError] = useState(null);

  const fetchAccounts = useCallback(async () => {
    // Retry on transient errors (server still booting, port races, etc.)
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        const r = await fetch("/api/accounts/detailed");
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        setData(await r.json());
        setError(null);
        return;
      } catch (e) {
        if (attempt === 2) {
          setError("Сервер не отвечает. Если только что запустил приложение — подожди 5 сек и нажми «Привязать» ещё раз. Если не помогает — закрой приложение и открой заново.");
        } else {
          await new Promise(r => setTimeout(r, 1500));
        }
      }
    }
  }, []);

  useEffect(() => { if (open) { setError(null); fetchAccounts(); } }, [open, fetchAccounts]);

  if (!open) return null;

  const addAccount = async () => {
    setBusy("__add__"); setError(null);
    try {
      const r = await fetch("/api/accounts/add_auto", { method: "POST" }).then(r => r.json());
      if (!r.ok) setError(r.error || "Не получилось добавить");
      else if (r.email) {
        // Pretty confirmation — alias was auto-derived from email
      }
      await fetchAccounts();
    } catch (e) {
      setError(String(e));
    } finally {
      setBusy(null);
    }
  };

  const removeAccount = async (alias) => {
    if (!confirm(`Удалить аккаунт ${alias}?`)) return;
    setBusy(alias);
    try {
      await fetch(`/api/accounts/${encodeURIComponent(alias)}`, { method: "DELETE" });
      await fetchAccounts();
    } catch (e) {
      setError(String(e));
    } finally {
      setBusy(null);
    }
  };

  const entries = data ? Object.entries(data) : [];

  return html`
    <div class="modal-backdrop" onClick=${(e) => { if (e.target.classList.contains("modal-backdrop")) onClose(); }}>
      <div class="modal" style="max-width: 600px;">
        <div class="modal-head">
          <div class="modal-eyebrow">
            <${Icon} name="user" />
            Google аккаунты
          </div>
          <h2>Привязанные аккаунты</h2>
          <div class="modal-policy">Каждый = один OAuth-токен под коротким именем. Агент может работать с любым.</div>
        </div>
        <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
          ${data === null && html`<div class="phase">Загружаю…</div>`}
          ${entries.length === 0 && data !== null && html`
            <div class="phase">Аккаунтов нет. Добавь первый.</div>
          `}
          ${entries.map(([alias, info]) => html`
            <div key=${alias} style="display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border);">
              <div style="min-width: 0;">
                <div style="font-weight: 600;">${alias}</div>
                <div style="color: var(--text-2); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                  ${info?.email || (info?.error ? `⚠ ${info.error.slice(0, 60)}` : "—")}
                  ${info?.name && html` · <span style="color: var(--text-3);">${info.name}</span>`}
                </div>
              </div>
              <button
                class="header-link"
                style="background: var(--danger-soft); color: var(--danger-text); border-color: rgba(185,28,28,0.4);"
                disabled=${busy === alias}
                onClick=${() => removeAccount(alias)}
              >
                ${busy === alias ? "…" : "Удалить"}
              </button>
            </div>
          `)}

          <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center;">
            <button class="big-btn" style="min-width: 240px;" disabled=${busy === "__add__"} onClick=${addAccount}>
              ${busy === "__add__" ? html`<span class="spinner"></span> Жду Google…` : "+ Привязать Google аккаунт"}
            </button>
            <div style="color: var(--text-3); font-size: 11.5px; margin-top: 8px;">
              Откроется браузер. Выбери аккаунт, подтверди — имя присвою сам по email.
            </div>
          </div>

          ${error && html`<div class="err" style="margin-top: 12px;">${error}</div>`}
        </div>
        <div class="modal-foot" style="display: flex; justify-content: flex-end; padding: 14px 20px; border-top: 1px solid var(--border);">
          <button class="header-link" onClick=${onClose}>Закрыть</button>
        </div>
      </div>
    </div>
  `;
}

/* ── composer ────────────────────────────────────────────────────── */
function Composer({ disabled, onSend }) {
  const [value, setValue] = useState("");
  // attachments: [{id, name, path?, size?, kind, uploading?, error?}]
  const [attachments, setAttachments] = useState([]);
  const [dropping, setDropping] = useState(false);
  const taRef = useRef(null);
  const fileInputRef = useRef(null);
  const folderInputRef = useRef(null);

  const autoSize = () => {
    const el = taRef.current;
    if (!el) return;
    el.style.height = "24px";
    el.style.height = Math.min(el.scrollHeight, 168) + "px";
  };

  useEffect(() => { autoSize(); }, [value]);
  useEffect(() => { if (!disabled) taRef.current?.focus(); }, [disabled]);

  /* Upload a FileList to /api/upload. Updates `attachments` state in-place
     (pending → done/error). For folder uploads, all files belong to one
     batch under <uploads>/<batch_id>/<folder_name>/...
  */
  const uploadFiles = async (fileList, asFolder) => {
    if (!fileList || fileList.length === 0) return;
    // Create pending chips so the user sees progress immediately
    const pending = Array.from(fileList).map(f => ({
      id: crypto.randomUUID(),
      name: f.webkitRelativePath || f.name,
      size: f.size,
      kind: "file",  // placeholder; server returns real kind on upload finish
      uploading: true,
    }));
    setAttachments(prev => [...prev, ...pending]);

    const fd = new FormData();
    for (const f of fileList) {
      // Preserve webkitRelativePath for folder structure
      fd.append("files", f, f.webkitRelativePath || f.name);
    }
    if (asFolder && fileList.length > 0) {
      const first = fileList[0].webkitRelativePath || "";
      const folderName = first.split("/")[0] || "folder";
      fd.append("folder_name", folderName);
    }

    try {
      const r = await fetch("/api/upload", { method: "POST", body: fd });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      // Match server-returned files (by name) back to our pending chips
      setAttachments(prev => prev.map(a => {
        if (!a.uploading) return a;
        const match = j.files.find(f => f.name === a.name);
        if (!match) return { ...a, uploading: false, error: "not in response" };
        return {
          ...a,
          uploading: false,
          path: match.path,
          size: match.size,
          kind: match.kind,
        };
      }));
    } catch (e) {
      setAttachments(prev => prev.map(a =>
        a.uploading ? { ...a, uploading: false, error: String(e).slice(0, 80) } : a
      ));
    }
  };

  const removeAttachment = (id) => {
    setAttachments(prev => prev.filter(a => a.id !== id));
  };

  /* Drag and drop */
  const onDragOver = (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (e.dataTransfer.types.includes("Files")) setDropping(true);
  };
  const onDragLeave = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDropping(false);
  };
  const onDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setDropping(false);
    if (e.dataTransfer.files?.length) {
      uploadFiles(e.dataTransfer.files, false);
    }
  };

  const submit = () => {
    const trimmed = value.trim();
    const readyAtts = attachments.filter(a => a.path && !a.uploading);
    // Allow sending even with empty text if there ARE attachments
    if ((!trimmed && readyAtts.length === 0) || disabled) return;
    // Block if any uploads are still pending
    if (attachments.some(a => a.uploading)) return;
    onSend(trimmed || "(см. вложения)", readyAtts);
    setValue("");
    setAttachments([]);
  };

  const onKey = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  };

  const hasUploading = attachments.some(a => a.uploading);
  const sendDisabled = disabled || hasUploading || (!value.trim() && attachments.length === 0);

  return html`
    <div class="composer-wrap">
      <div class="composer">
        <input
          type="file"
          ref=${fileInputRef}
          multiple
          style="display:none"
          onChange=${(e) => { uploadFiles(e.target.files, false); e.target.value = ""; }}
        />
        <input
          type="file"
          ref=${folderInputRef}
          webkitdirectory=""
          directory=""
          multiple
          style="display:none"
          onChange=${(e) => { uploadFiles(e.target.files, true); e.target.value = ""; }}
        />
        ${attachments.length > 0 && html`
          <div class="attachments-row">
            ${attachments.map(a => html`
              <div class=${"attachment-chip" + (a.uploading ? " uploading" : "") + (a.error ? " error" : "")} key=${a.id}>
                <${Icon} name=${attachKindIcon(a.kind)} class="chip-icon" />
                <span class="chip-name" title=${a.path || a.name}>${a.name}</span>
                ${a.size && html`<span class="chip-meta">${fmtSize(a.size)}</span>`}
                ${a.error && html`<span class="chip-meta" style="color: var(--danger-text);">${a.error}</span>`}
                <button onClick=${() => removeAttachment(a.id)} aria-label="Убрать">
                  <${Icon} name="x" />
                </button>
              </div>
            `)}
          </div>
        `}
        <div
          class=${"composer-inner" + (disabled ? " disabled" : "") + (dropping ? " dropping" : "")}
          onDragOver=${onDragOver}
          onDragLeave=${onDragLeave}
          onDrop=${onDrop}
          style="position: relative;"
        >
          <button
            class="attach-btn"
            disabled=${disabled}
            onClick=${() => fileInputRef.current?.click()}
            aria-label="Прикрепить файл"
            title="Прикрепить файл"
          >
            <${Icon} name="paperclip" />
          </button>
          <button
            class="attach-btn"
            disabled=${disabled}
            onClick=${() => folderInputRef.current?.click()}
            aria-label="Прикрепить папку"
            title="Прикрепить папку"
          >
            <${Icon} name="folder" />
          </button>
          <textarea
            ref=${taRef}
            rows="1"
            placeholder="Что нужно сделать? Или перетащи файл/папку сюда."
            value=${value}
            onInput=${e => setValue(e.target.value)}
            onKeyDown=${onKey}
            disabled=${disabled}
          ></textarea>
          <button class="send-btn" disabled=${sendDisabled} onClick=${submit} aria-label="Отправить">
            <${Icon} name="send" />
          </button>
          ${dropping && html`<div class="drop-hint">Отпусти файлы здесь</div>`}
        </div>
        <div class="composer-meta">
          <span>${disabled ? "Агент работает…" : hasUploading ? "Загрузка…" : "Готов к запросу"}</span>
          <span><span class="kbd">Enter</span> отправить · <span class="kbd">Shift</span>+<span class="kbd">Enter</span> новая строка</span>
        </div>
      </div>
    </div>
  `;
}

function attachKindIcon(kind) {
  return ({
    image: "image",
    pdf: "file-text",
    excel: "file-text",
    text: "file-text",
  })[kind] || "file";
}
function fmtSize(b) {
  if (b < 1024) return b + "B";
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + "KB";
  if (b < 1024 * 1024 * 1024) return (b / 1024 / 1024).toFixed(1) + "MB";
  return (b / 1024 / 1024 / 1024).toFixed(2) + "GB";
}

/* ── render one assistant event ──────────────────────────────────── */
function AssistantEvent({ ev }) {
  if (ev.kind === "text")     return html`<${Markdown} text=${ev.text} />`;
  if (ev.kind === "tool")     return html`<${ToolCard} tool=${ev} />`;
  if (ev.kind === "denied")   return html`<${DeniedBadge} name=${ev.name} />`;
  if (ev.kind === "fatal")    return html`<${FatalBlock} msg=${ev.error} />`;
  return null;
}

/* ── one turn ────────────────────────────────────────────────────── */
function Turn({ turn, isLast, isStreaming, awaitingFirstReply }) {
  if (turn.role === "user") {
    return html`
      <div class="turn-user">
        <div class="bubble-user">
          ${turn.text}
          ${turn.attachments && turn.attachments.length > 0 && html`
            <div class="attachments-row" style="margin-top: 8px;">
              ${turn.attachments.map(a => html`
                <div class="attachment-chip" key=${a.path || a.name} style="background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); color: inherit;">
                  <${Icon} name=${attachKindIcon(a.kind)} class="chip-icon" />
                  <span class="chip-name" title=${a.path}>${a.name}</span>
                </div>
              `)}
            </div>
          `}
        </div>
      </div>
    `;
  }
  const showThinking =
    isLast && isStreaming && (
      turn.events.length === 0 ||
      (awaitingFirstReply && turn.events.every(e => e.kind !== "text"))
    );

  return html`
    <div class="turn-asst">
      ${turn.events.map((ev, i) => html`<${AssistantEvent} ev=${ev} key=${ev.id || i} />`)}
      ${showThinking && html`
        <div class="thinking">
          <span class="dots"><span></span><span></span><span></span></span>
          ${turn.events.length === 0 ? "Думаю…" : "Анализирую результат…"}
        </div>
      `}
    </div>
  `;
}

/* ── first-run wizard — installs Claude Code, logs into Anthropic +
       Google. Renders before <App> when /api/setup/status is incomplete. */
function SetupWizard({ status, onDone }) {
  const [busy, setBusy] = useState(null);     // active action key
  const [err, setErr] = useState(null);
  const [startedAt, setStartedAt] = useState(null);
  const [elapsed, setElapsed] = useState(0);  // seconds since action started
  // Claude auth is a 2-stage flow: spawn the setup-token terminal, then
  // the user clicks "Готово" once the terminal walked them through OAuth.
  const [claudeSpawned, setClaudeSpawned] = useState(false);
  const [claudeAuthDone, setClaudeAuthDone] = useState(false);
  const [claudeFallbackUrl, setClaudeFallbackUrl] = useState(null);

  const verifyClaudeAuth = async () => {
    setBusy("login_claude_check"); setErr(null);
    setStartedAt(Date.now()); setElapsed(0);
    const r = await fetch("/api/setup/check_claude_auth", { method: "POST" }).then(r => r.json());
    setBusy(null); setStartedAt(null);
    if (r.ok) {
      setClaudeAuthDone(true);
    } else {
      setErr("Claude ещё не подключен. " + (r.error || r.stderr_tail || "") + " Открой окно с настройкой ещё раз и доведи до конца.");
      setClaudeSpawned(false);
    }
  };

  // Tick the elapsed timer every second while busy
  useEffect(() => {
    if (!startedAt) return;
    const id = setInterval(() => {
      setElapsed(Math.round((Date.now() - startedAt) / 1000));
    }, 1000);
    return () => clearInterval(id);
  }, [startedAt]);

  // Poll setup status so the wizard auto-advances when the user finishes
  // an external task (claude TUI, OAuth browser). Auth probe costs a few
  // tokens — do it every 12s, not 5s, and skip if a probe is already in
  // flight (avoid overlap when --print response is slow).
  useEffect(() => {
    if (!busy && !claudeSpawned) return;
    let inFlight = false;
    const id = setInterval(async () => {
      if (inFlight) return;
      inFlight = true;
      try {
        const r = await fetch("/api/setup/status?probe_auth=" + (claudeSpawned ? "true" : "false"));
        if (r.ok) {
          const j = await r.json();
          if (j) onDone(j);
        }
      } catch {} finally {
        inFlight = false;
      }
    }, claudeSpawned ? 12000 : 3000);
    return () => clearInterval(id);
  }, [busy, claudeSpawned, onDone]);

  const refetch = useCallback(async () => {
    const r = await fetch("/api/setup/status").then(r => r.json());
    onDone(r);
    return r;
  }, [onDone]);

  const runAction = async (key, url) => {
    setBusy(key); setErr(null);
    setStartedAt(Date.now()); setElapsed(0);
    try {
      const r = await fetch(url, { method: "POST" }).then(r => r.json());
      if (!r.ok) setErr(r.error || "Что-то пошло не так. Попробуй ещё раз.");
    } catch (e) {
      setErr(String(e));
    } finally {
      setBusy(null);
      setStartedAt(null);
      await refetch();
    }
  };

  const haveClaudeCli   = status?.claude_cli?.installed;
  const haveClaudeAuth  = status?.claude_auth?.ok;
  const haveOauthClient = status?.oauth_client?.present;
  const haveMainToken   = status?.main_token?.present;
  // We need claude installed AND logged in before considering step 1 done
  const step1Done = haveClaudeCli && haveClaudeAuth;

  // Per-phase status text shown UNDER the button while busy. Anchors
  // the user — "what's actually happening right now".
  let phaseText = null;
  if (busy === "install") {
    phaseText = elapsed < 15
      ? `⬇ Скачиваю Claude Code с anthropic.com… (${elapsed}с)`
      : elapsed < 60
        ? `⚙ Распаковываю и устанавливаю… (${elapsed}с / обычно 30-90с)`
        : `⏳ Всё ещё идёт (${elapsed}с). Если больше 3 минут — проверь интернет, потом перезапусти.`;
  } else if (busy === "login_claude_spawn") {
    phaseText = `Открываю терминал…`;
  } else if (busy === "login_claude_check") {
    phaseText = `🔍 Проверяю что Claude отвечает (${elapsed}с)…`;
  } else if (busy === "login_google") {
    phaseText = `🌐 Открыл вкладку браузера для входа в Google. Выбери аккаунт и подтверди. (${elapsed}с)`;
  } else if (busy === "recheck") {
    phaseText = `Проверяю… (${elapsed}с)`;
  } else if (claudeSpawned && !haveClaudeAuth) {
    phaseText = "🌐 Открыл браузер с Anthropic OAuth. Залогинься через свой Pro/Max аккаунт — wizard поймёт автоматически (проверка каждые 12 сек).";
  }

  let stepNum, stepTitle, stepSub, button;
  if (!haveClaudeCli) {
    stepNum = 1;
    stepTitle = "Установка Claude Code";
    stepSub = "Это бесплатная утилита от Anthropic — программа, которая на самом деле общается с моделью. Если уже есть на компьютере, кнопка просто проверит и пойдёт дальше.";
    button = {
      label: busy === "install" ? "Устанавливаю…" : "Установить",
      onClick: () => runAction("install", "/api/setup/install_claude"),
      key: "install",
    };
  } else if (!haveClaudeAuth) {
    stepNum = "1.5";
    stepTitle = "Войти в Claude";
    stepSub = claudeSpawned
      ? "Открыл браузер с Anthropic. Залогинься через Pro/Max — wizard сам подхватит, ничего больше делать не нужно."
      : "Открою браузер для входа в свой Anthropic Pro/Max аккаунт. Никаких терминалов и команд.";
    button = {
      label: busy === "login_claude_spawn" ? "Открываю…" : claudeSpawned ? "Открыть ещё раз" : "Войти",
      onClick: async () => {
        setBusy("login_claude_spawn"); setErr(null);
        setStartedAt(Date.now()); setElapsed(0);
        const c = await fetch("/api/setup/login_claude", { method: "POST" }).then(r => r.json());
        setBusy(null); setStartedAt(null);
        if (!c.ok) { setErr("Не удалось открыть OAuth Claude: " + (c.error || "")); return; }
        setClaudeSpawned(true);
        // Stash fallback URL in case the browser didn't auto-open
        if (c.fallback_url) setClaudeFallbackUrl(c.fallback_url);
      },
      key: "login_claude_spawn",
    };
  } else if (!haveOauthClient) {
    stepNum = "!";
    stepTitle = "Не хватает OAuth-клиента";
    stepSub = "В папке с программой нет файла client_secret_*.json. Положи его рядом с workspace_agent.exe и нажми «Проверить».";
    button = {
      label: busy === "recheck" ? "Проверяю…" : "Проверить",
      onClick: () => runAction("recheck", "/api/setup/status"),
      key: "recheck",
    };
  } else if (!haveMainToken) {
    stepNum = 2;
    stepTitle = "Войди в Google";
    stepSub = "Откроется браузер — выбери аккаунт (Drive/Sheets/Gmail) и подтверди.";
    button = {
      label: busy === "login_google" ? "Жду Google…" : "Войти в Google",
      onClick: async () => {
        setBusy("login_google"); setErr(null);
        setStartedAt(Date.now()); setElapsed(0);
        const g = await fetch("/api/setup/start_oauth", { method: "POST" }).then(r => r.json());
        setBusy(null); setStartedAt(null);
        if (!g.ok) setErr("Google login: " + (g.error || "ошибка"));
        await refetch();
      },
      key: "login_google",
    };
  }

  return html`
    <div class="wiz-wrap">
      <div class="wiz">
        <h1>Workspace Agent</h1>
        <div class="progress">
          <div class=${"dot " + (haveClaudeCli ? "done" : "active")}></div>
          <div class=${"dot " + (haveClaudeAuth ? "done" : haveClaudeCli ? "active" : "")}></div>
          <div class=${"dot " + (haveMainToken ? "done" : step1Done ? "active" : "")}></div>
        </div>
        <div class="step-num">Шаг ${stepNum}</div>
        <div class="step-title">${stepTitle}</div>
        <div class="step-sub">${stepSub}</div>
        <button class="big-btn" disabled=${!!busy} onClick=${button.onClick}>
          ${busy === button.key && html`<span class="spinner"></span>`}
          ${button.label}
        </button>
        ${claudeSpawned && !haveClaudeAuth && claudeFallbackUrl && html`
          <div class="phase">
            Если браузер не открылся —
            <a href=${claudeFallbackUrl} target="_blank" rel="noopener noreferrer" style="color: var(--primary-text);">кликни сюда</a>
          </div>
        `}
        ${phaseText && html`<div class="phase">${phaseText}</div>`}
        ${err && html`<div class="err">${err}</div>`}
      </div>
    </div>
  `;
}

/* ── main app ────────────────────────────────────────────────────── */
function App() {
  // turns: [{role:'user', text}, {role:'assistant', events:[]}]
  const [turns, setTurns] = useState([]);
  const [streaming, setStreaming] = useState(false);
  const [approvalQueue, setApprovalQueue] = useState([]); // FIFO of approval_required events
  const [connError, setConnError] = useState(null);
  const [alerts, setAlerts] = useState([]); // queued failure alerts from watcher
  const [accounts, setAccounts] = useState([]);
  const [model, setModel] = useState(null);
  const [models, setModels] = useState([]);
  const [modelBusy, setModelBusy] = useState(false);
  const [theme, setTheme] = useState(() => {
    try {
      const saved = localStorage.getItem("theme");
      if (saved === "light" || saved === "dark") return saved;
    } catch {}
    if (window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches) return "light";
    return "dark";
  });
  // null = still loading; object = loaded; .complete drives whether the
  // wizard or the chat renders.
  const [setupStatus, setSetupStatus] = useState(null);
  const [accountsOpen, setAccountsOpen] = useState(false);
  useEffect(() => {
    fetch("/api/setup/status")
      .then(r => r.ok ? r.json() : null)
      .then(j => setSetupStatus(j || { complete: true }))
      .catch(() => setSetupStatus({ complete: true }));  // fall through on error
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    try { localStorage.setItem("theme", theme); } catch {}
  }, [theme]);

  const toggleTheme = useCallback(() => {
    setTheme(t => t === "light" ? "dark" : "light");
  }, []);

  const logRef = useRef(null);
  const eventSrcRef = useRef(null);
  const autoScrollRef = useRef(true);
  const turnsRef = useRef(turns);
  useEffect(() => { turnsRef.current = turns; }, [turns]);

  /* ── load accounts on mount ─────────────────────────────────── */
  useEffect(() => {
    fetch("/api/accounts")
      .then(r => r.ok ? r.json() : { accounts: [] })
      .then(j => setAccounts(j.accounts || []))
      .catch(() => {});
  }, []);

  /* ── load model selection on mount ──────────────────────────── */
  useEffect(() => {
    fetch("/api/model")
      .then(r => r.ok ? r.json() : null)
      .then(j => {
        if (!j) return;
        setModel(j.current);
        setModels(j.models || []);
      })
      .catch(() => {});
  }, []);

  /* ── poll alerts: every 30s + on mount. Background watcher writes to
        alerts.json from Cloud Logging; we surface them here. SSE pushes
        them in real-time too — poll only serves as catch-up on tab reload.
        Skip the setAlerts call if the payload didn't change, so we don't
        force a banner re-render on every tick.                          */
  useEffect(() => {
    let cancelled = false;
    let lastSig = "";
    const tick = () => {
      fetch("/api/alerts?unread_only=false&limit=20")
        .then(r => r.ok ? r.json() : null)
        .then(j => {
          if (cancelled || !j) return;
          const sig = JSON.stringify(j.alerts || []);
          if (sig === lastSig) return;
          lastSig = sig;
          setAlerts(j.alerts || []);
        })
        .catch(() => {});
    };
    tick();
    const id = setInterval(tick, 30_000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  const dismissAlert = useCallback(async (id) => {
    setAlerts(prev => prev.filter(a => a.id !== id));
    try {
      await fetch("/api/alerts/mark_read", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ alert_ids: [id] }),
      });
    } catch {}
  }, []);

  const dismissAllAlerts = useCallback(async () => {
    setAlerts([]);
    try {
      await fetch("/api/alerts/mark_read", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ alert_ids: null }),
      });
    } catch {}
  }, []);

  const askAboutAlert = useCallback((alert) => {
    const msg = `Скрипт ${alert.script_label || alert.script_id} (функция ${alert.function || "?"}) упал в ${alert.timestamp}: «${alert.kind}». Открой Cloud Logging по этому скрипту, посмотри что именно случилось, и если можно — почини.`;
    sendMessage(msg, []);
    dismissAlert(alert.id);
  }, [dismissAlert]);

  const onSelectModel = useCallback(async (alias) => {
    if (!alias || alias === model) return;
    setModelBusy(true);
    const prev = model;
    setModel(alias);  // optimistic
    try {
      const r = await fetch("/api/model", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ alias }),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const j = await r.json();
      setModel(j.current);
    } catch (e) {
      setModel(prev);
      setConnError(`Не удалось переключить модель: ${e.message}`);
    } finally {
      setModelBusy(false);
    }
  }, [model]);

  /* ── auto-scroll with manual override ───────────────────────── */
  useEffect(() => {
    const el = logRef.current;
    if (!el) return;
    const onScroll = () => {
      const distFromBottom = el.scrollHeight - el.scrollTop - el.clientHeight;
      autoScrollRef.current = distFromBottom < 60;
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => el.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    const el = logRef.current;
    if (!el) return;
    if (autoScrollRef.current) {
      el.scrollTo({ top: el.scrollHeight, behavior: "instant" in el ? "instant" : "auto" });
    }
  }, [turns, approvalQueue]);

  /* ── mutate last assistant turn helpers ─────────────────────── */
  const updateLastAsst = useCallback((mutator) => {
    setTurns(prev => {
      const next = prev.slice();
      for (let i = next.length - 1; i >= 0; i--) {
        if (next[i].role === "assistant") {
          next[i] = { ...next[i], events: mutator(next[i].events) };
          break;
        }
      }
      return next;
    });
  }, []);

  /* ── SSE event handler ──────────────────────────────────────── */
  const onSSE = useCallback((raw) => {
    let ev;
    try { ev = JSON.parse(raw); } catch { return; }

    switch (ev.type) {
      case "text": {
        updateLastAsst(events => [...events, { kind: "text", text: ev.text, id: cryptoId() }]);
        break;
      }
      case "tool_call": {
        updateLastAsst(events => [...events, {
          kind: "tool",
          id: ev.tool_use_id,
          tool_use_id: ev.tool_use_id,
          name: ev.name,
          input: ev.input,
          result: undefined,
          error: undefined,
          denied: false,
        }]);
        break;
      }
      case "tool_result": {
        updateLastAsst(events => events.map(e =>
          e.kind === "tool" && e.tool_use_id === ev.tool_use_id
            ? { ...e, result: ev.result_preview }
            : e
        ));
        break;
      }
      case "tool_error": {
        updateLastAsst(events => events.map(e =>
          e.kind === "tool" && e.tool_use_id === ev.tool_use_id
            ? { ...e, error: ev.result_preview }
            : e
        ));
        break;
      }
      case "approval_required": {
        setApprovalQueue(q => [...q, ev]);
        break;
      }
      case "tool_denied": {
        updateLastAsst(events => {
          // mark most recent unresolved tool with matching name as denied,
          // or append a denied badge if no matching tool yet
          const idx = [...events].reverse().findIndex(e =>
            e.kind === "tool" && e.name === ev.name && !e.result && !e.error && !e.denied
          );
          if (idx >= 0) {
            const realIdx = events.length - 1 - idx;
            const next = events.slice();
            next[realIdx] = { ...next[realIdx], denied: true, error: "Действие отклонено пользователем" };
            return [...next, { kind: "denied", name: ev.name, id: cryptoId() }];
          }
          return [...events, { kind: "denied", name: ev.name, id: cryptoId() }];
        });
        break;
      }
      case "fatal_error": {
        updateLastAsst(events => [...events, { kind: "fatal", error: ev.error, id: cryptoId() }]);
        break;
      }
      case "alert": {
        // Background watcher pushed a new failure alert
        setAlerts(prev => {
          if (prev.some(a => a.id === ev.alert.id)) return prev;
          return [ev.alert, ...prev];
        });
        break;
      }
      case "done": {
        closeStream();
        break;
      }
      case "model_used": {
        // Fires at the start of each turn telling us which model handled it
        // (matters only when user picked 'auto'). Stash on the latest
        // assistant turn so it can be shown as a small pill.
        setTurns(prev => {
          const next = prev.slice();
          for (let i = next.length - 1; i >= 0; i--) {
            if (next[i].role === "assistant") {
              next[i] = { ...next[i], modelUsed: ev.label, modelPreference: ev.preference };
              break;
            }
          }
          return next;
        });
        break;
      }
      default:
        console.warn("unknown sse event", ev);
    }
  }, [updateLastAsst]);

  const closeStream = useCallback(() => {
    if (eventSrcRef.current) {
      eventSrcRef.current.close();
      eventSrcRef.current = null;
    }
    setStreaming(false);
  }, []);

  /* ── kick off a turn ────────────────────────────────────────── */
  const sendMessage = useCallback(async (text, attachments) => {
    setConnError(null);
    const atts = attachments || [];
    // append user + empty assistant turn
    setTurns(prev => [
      ...prev,
      { role: "user", text, attachments: atts },
      { role: "assistant", events: [] },
    ]);
    setStreaming(true);

    let runId;
    try {
      const r = await fetch("/chat", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          message: text,
          attachments: atts.map(a => ({ name: a.name, path: a.path, kind: a.kind })),
        }),
      });
      if (!r.ok) throw new Error(`POST /chat → ${r.status}`);
      const j = await r.json();
      runId = j.run_id;
      if (!runId) throw new Error("no run_id in response");
    } catch (e) {
      setStreaming(false);
      setConnError(`Не удалось отправить запрос: ${e.message}`);
      updateLastAsst(events => [...events, { kind: "fatal", error: e.message, id: cryptoId() }]);
      return;
    }

    // open SSE
    try {
      const es = new EventSource(`/stream/${runId}`);
      eventSrcRef.current = es;
      es.onmessage = (m) => onSSE(m.data);
      es.onerror = () => {
        // browser will auto-retry; but if connection truly dropped before `done`,
        // surface it. We tolerate brief reconnects silently — only show after
        // the connection has been in error state for 1s.
        setTimeout(() => {
          if (eventSrcRef.current === es && es.readyState === EventSource.CLOSED) {
            setConnError("SSE-соединение разорвано. Перезагрузите страницу.");
            closeStream();
          }
        }, 1000);
      };
    } catch (e) {
      setStreaming(false);
      setConnError(`Не удалось открыть поток: ${e.message}`);
    }
  }, [onSSE, updateLastAsst, closeStream]);

  /* ── resolve an approval (pop from FIFO) ────────────────────── */
  const onApprovalResolve = useCallback((requestId, approved) => {
    setApprovalQueue(q => q.filter(x => x.request_id !== requestId));
  }, []);

  /* ── derive state for UI ────────────────────────────────────── */
  const hasMessages = turns.length > 0;
  const currentApproval = approvalQueue[0] || null;
  const inputDisabled = streaming || !!currentApproval;

  const lastAsstIdx = useMemo(() => {
    for (let i = turns.length - 1; i >= 0; i--) {
      if (turns[i].role === "assistant") return i;
    }
    return -1;
  }, [turns]);

  // First-run gate: while we don't know setup state, show nothing. Once
  // we know and it's incomplete, show the wizard. Wizard's onDone updates
  // setupStatus; the moment status.complete flips true, this branch falls
  // through to the chat.
  if (setupStatus === null) return null;
  if (!setupStatus.complete) {
    return html`<${SetupWizard} status=${setupStatus} onDone=${setSetupStatus} />`;
  }

  return html`
    <div class="app">
      <${Header}
        accounts=${accounts}
        theme=${theme}
        onToggleTheme=${toggleTheme}
        model=${model}
        models=${models}
        onSelectModel=${onSelectModel}
        modelBusy=${modelBusy}
        onOpenAccounts=${() => setAccountsOpen(true)}
      />
      <div class="log-wrap" ref=${logRef}>
        ${!hasMessages ? html`<${EmptyState} />` : html`
          <div class="log">
            ${connError && html`
              <div class="conn-err">
                <${Icon} name="alert" />
                <span>${connError}</span>
                <button onClick=${() => location.reload()}>
                  <${Icon} name="refresh" /> Перезагрузить
                </button>
              </div>
            `}
            ${turns.map((t, i) => html`
              <${Turn}
                key=${i}
                turn=${t}
                isLast=${i === lastAsstIdx}
                isStreaming=${streaming && i === lastAsstIdx}
                awaitingFirstReply=${streaming}
              />
            `)}
          </div>
        `}
      </div>
      <${AlertsBanner} alerts=${alerts} onDiscuss=${askAboutAlert} onDismiss=${dismissAlert} onClearAll=${dismissAllAlerts} />
      <${Composer} disabled=${inputDisabled} onSend=${sendMessage} />
      <${ApprovalModal} req=${currentApproval} onResolve=${onApprovalResolve} />
      <${AccountsModal} open=${accountsOpen} onClose=${() => { setAccountsOpen(false); fetch("/api/accounts").then(r => r.json()).then(j => setAccounts(j.accounts || [])).catch(() => {}); }} />
    </div>
  `;
}

/* ── alerts banner — failures pushed by the background watcher ─── */
function AlertsBanner({ alerts, onDiscuss, onDismiss, onClearAll }) {
  const unread = (alerts || []).filter(a => !a.read);
  if (unread.length === 0) return null;
  const hasError = unread.some(a => (a.severity || "").toUpperCase().includes("ERROR"));
  const fmtTime = (ts) => {
    if (!ts) return "?";
    try { return new Date(ts).toLocaleString("ru-RU", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" }); }
    catch { return ts.slice(0, 16); }
  };
  return html`
    <div class="alerts-wrap">
      <div class=${"alerts-banner" + (hasError ? " severity-error" : "")}>
        <div class="alerts-banner-head">
          <${Icon} name="alert" />
          Сбои в Apps Script <span class="count">${unread.length}</span>
          <button class="clear" onClick=${onClearAll}>Скрыть все</button>
        </div>
        ${unread.slice(0, 5).map(a => html`
          <div class="alert-row" key=${a.id}>
            <div class="alert-msg">
              <span class="kind">${a.kind || "Ошибка"}</span> — ${a.script_label || a.script_id?.slice(0, 14)} / <code>${a.function || "?"}</code>
              <div class="alert-meta">${fmtTime(a.timestamp)} · ${(a.preview || a.message || "").slice(0, 120)}</div>
            </div>
            <div class="actions">
              <button class="primary" onClick=${() => onDiscuss(a)}>Что делать?</button>
              <button onClick=${() => onDismiss(a.id)}>×</button>
            </div>
          </div>
        `)}
        ${unread.length > 5 && html`<div class="alert-meta" style="text-align: center;">+ ещё ${unread.length - 5} ...</div>`}
      </div>
    </div>
  `;
}

function cryptoId() {
  if (window.crypto?.randomUUID) return crypto.randomUUID();
  return "id-" + Math.random().toString(36).slice(2);
}

render(h(App), document.getElementById("root"));
</script>
</body>
</html>
